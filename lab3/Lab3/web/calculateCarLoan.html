<!DOCTYPE html>
<html>
    <head>
        <title>Car Loan Calculation</title>
    </head>
    <body>
        <h1>Perform Car Loan Calculation</h1>
        <form action="processCalculateCarLoan.jsp" method="POST">
            <fieldset>
                <legend>Loan Calculation</legend>
                <p>
                    <label>Loan Amount *</label>
                    <input type="text" name="loan_amount" placeholder="Amount" required>
                </p>
                <p>
                    <label>Period</label>
                    <select name="loan_period">
                        <option value="3">3 years</option>
                        <option value="4">4 years</option>
                        <option value="5">5 years</option>
                        <option value="7">7 years</option>
                    </select>
                </p>
                <p>
                    <input type="submit" value="Submit">
                    <input type="reset" value="Cancel">
                </p>
            </fieldset>
        </form>

    </body>
</html>
